<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Landing Page</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="container">

        <!--Barra de menu -->
        
        <nav class="navbar">

            <div class="left">
                <img src="imagens/netflix-logo.png" alt="">
            </div>


            <div class="right">
                <select class="language">
                    <option value="">Português</option>
                    <option value="">Inglês</option>
                </select>
                <button><a href="">Entrar</a></button>
            </div>
        </nav>


        <!-- Parte de baixo do conteudo -->

        <div class="title">
            
            <div class="content">
                <h1>Filmes, séries e muito mais.Sem limites</h1>
                <h2>Assista onde quiser. Cancele quando quiser.</h2>

                <form action="#">
                    <h3>Pronto para assistir? Informe seu e-mail para criar ou reiniciar sua assinatura</h3>
                    <div class="email">
                        <input type="email" name="email" placeholder="E-mail">
                        <button><a href="#">Vamos lá</a></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
