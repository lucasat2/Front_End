<!DOCTYPE html>
<html>

<head>
    <title>Aula 1</title>
    
</head>

<body>
    <div class="container">
        <div class="item_1">Item 1</div>
        <div class="item_2">Item 2</div>
        <div class="item_3">Item 3</div>
    </div>

    <style>

        /* O flex alinha os itens um ao lado do outro. 
        Quando só flex , ocupa todo o espaço definido, 
        quando inline flex, tira as sobras. */

        .container {
            display: flex; /* ou inline-flex */
            background-color: #1e454f;
            margin: 20px auto;
            max-width: 500px;
            font-family: sans-serif;
        }

        .container div {
            background: #028082;
            margin: 8px 4px;
            font-size: 1em;
            color: #fff;
            text-decoration: none;


        }
    </style>
</body>

</html>
