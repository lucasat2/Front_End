<!DOCTYPE html>
<html>

<head>
    <title>Aula 2</title>
    <link rel="stylesheet" type="text/css" href="aula2.css">
</head>

<body>

    <!-- row: Este é o valor padrão, onde os itens são organizados para
exibição em forma de linha da esquerda para a direita;

row-reverse: Os itens também são organizados em linha, só que
em ordem reversa em relação ao valor anterior. Da direita para
a esquerda;

column: Os itens são organizados em forma de colunas iniciando
de cima para baixo;

column-reverse: Os itens são organizados em forma de colunas,
só que iniciando de baixo para cima. -->


    <h4>row</h4>
    <div class="container row">
        <div class="item_1">Item 1</div>
        <div class="item_2">Item 2</div>
        <div class="item_3">Item 3</div>
        <div class="item_4">Item 4</div>
    </div>

    <h4>row-reverse</h4>
    <div class="container row-reverse">
        <div class="item_1">Item 1</div>
        <div class="item_2">Item 2</div>
        <div class="item_3">Item 3</div>
        <div class="item_4">Item 4</div>
    </div>

    <h4>column</h4>
    <div class="container column">
        <div class="item_1">Item 1</div>
        <div class="item_2">Item 2</div>
        <div class="item_3">Item 3</div>
        <div class="item_4">Item 4</div>
    </div>

    <h4>column-reverse</h4>
    <div class="container column-reverse">
        <div class="item_1">Item 1</div>
        <div class="item_2">Item 2</div>
        <div class="item_3">Item 3</div>
        <div class="item_4">Item 4</div>
    </div>

    <style>
        .container {
            display: flex;
            background-color: #cdf6eb;
            margin: 10px auto 30px;
            max-width: 500px;
            font-family: sans-serif;
        }

        .row {
            flex-direction: row;
        }

        .row-reverse {
            flex-direction: row-reverse;
        }

        .column {
            flex-direction: column;
        }

        .column-reverse {
            flex-direction: column-reverse;
        }

        .container div {
            background: #028082;
            height: 80px;
            font-size: 1em;
            color: #fff;
            /* as prioridades a partir daqui alinham o texto no centro */
            display: flex;
            text-align: center;
            justify-content: center;
            align-items: center;
        }

        .row div,
        .row-reverse div {
            margin: 8px 4px;
            width: 80px;
        }

        .column div,
        .column-reverse div {
            margin: 8px;
        }

        h4 {
            margin: 20px 0 0 20px;
            font-family: sans-serif;
            font-weight: normal;
            font-size: 1em;
            color: #3b3b3b;
            text-align: center;
        }
    </style>

</body>

</html>
