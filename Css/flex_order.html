<!DOCTYPE html>
<html>

<head>
    <title>Aula 11</title>
    <link rel="stylesheet" type="text/css" href="aula11.css">
</head>

<body>
    <h4>order - exemplo 1</h4>
    <div class="container row">
        <div class="grow_1 order_3">Item 1</div>
        <div class="grow_1">Item 2</div>
        <div class="grow_1 order_4">Item 3</div>
        <div class="grow_1 order_2">Item 4</div>
    </div>
    <h4>order - exemplo 2</h4>
    <div class="container row">
        <div class="grow_1 order_2">Item 1</div>
        <div class="grow_1 order_4">Item 2</div>
        <div class="grow_1 order_2">Item 3</div>
        <div class="grow_1 order_menosUm">Item 4</div>
    </div>
    <h4>order - exemplo 3</h4>
    <div class="container column">
        <div class="grow_1 order_2">Item 1</div>
        <div class="grow_1">Item 2</div>
        <div class="grow_1 order_4">Item 3</div>
        <div class="grow_1 order_2">Item 4</div>
    </div>
    <h4>order - exemplo 3</h4>
    <div class="container column">
        <div class="grow_1 order_3">Item 1</div>
        <div class="grow_1 order_4">Item 2</div>
        <div class="grow_1 order_2">Item 3</div>
        <div class="grow_1 order_menosUm">Item 4</div>
    </div>

    <style>
        .container {
            display: flex;
            background-color: #cdf6eb;
            margin: 10px auto 30px;
            max-width: 500px;
            font-family: sans-serif;
            flex-wrap:wrap;
        }

        .order_menosUm {
            order: -1;
        }

        .order_1 {
            order: 1;
        }

        .order_2 {
            order: 2;
        }

        .order_3 {
            order: 3;
        }

        .order_4 {
            order: 4;
        }

        .grow_1 {
            flex-grow: 1
        }

        .column {
            flex-direction: column;
        }

        .container div {
            background: #028082;
            height: 80px;
            font-size: 1em;
            color: #fff;
            /* as proriedades a partir daqui alinham o texto no centro */
            display: flex;
            text-align: center;
            justify-content: center;
            align-items: center;
        }

        .row div {
            margin: 8px 4px;
            width: 80px;
        }

        .column div {
            margin: 8px;
        }

        h4 {
            margin: 20px 0 0 20px;
            padding: 0 2%;
            font-family: sans-serif;
            font-weight: normal;
            font-size: 1em;
            color: #3b3b3b;
            text-align: center;
        }
    </style>
</body>

</html>
