<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h1>Exemplo 1</h1>
    <script>

        let dia = 3;
        let nomeDia;

        switch (dia) {
            case 1:
                nomeDia = "Domingo";
                break;
            case 2:
                nomeDia = "Segunda-feira";
                break;
            case 3:
                nomeDia = "Terça-feira";
                break;
            case 4:
                nomeDia = "Quarta-feira";
                break;
            case 5:
                nomeDia = "Quinta-feira";
                break;
            case 6:
                nomeDia = "Sexta-feira";
                break;
            case 7:
                nomeDia = "Sábado";
                break;
            default:
                nomeDia = "Dia inválido";
        }

        console.log(nomeDia);


    </script>


    <script>

    <h1>Exemplo 2</h1>

        let categoria = "A";

        switch (categoria) {
            case "A":
                console.log("Produto de Categoria Premium.");
                break;
            case "B":
                console.log("Produto de Categoria Intermediária.");
                break;
            case "C":
                console.log("Produto de Categoria Básica.");
                break;
            default:
                console.log("Categoria inválida.");
        }
    </script>


<h1>Exemplo 3</h1>
    <script>

        let temperatura = 30;

        switch (true) {
            case temperatura > 40:
                console.log("Cuidado: Temperatura muito alta!");
                break;
            case temperatura >= 30 && temperatura <= 40:
                console.log("Está calor.");
                break;
            case temperatura >= 20 && temperatura < 30:
                console.log("Clima agradável.");
                break;
            default:
                console.log("Está frio.");
        }

    </script>


</body>

</html>
